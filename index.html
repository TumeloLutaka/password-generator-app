<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />

    <script defer src="./main.js"></script>

    <title>Frontend Mentor | Password generator app</title>
  </head>
  <body>
    <main>
      <h1 class="generator__title">Password Generator</h1>

      <section class="generator__result">
        <p class="generator__display generator__display--inactive">P4$5W0rD!</p>
        <div class="generator__copy-wrapper">
          <p id="generator__copied-indicator" class="hidden">COPIED</p>
          <button class="generator__copy" type="button">
            <p class="sr-only">Copy</p>
            <svg width="21" height="24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M20.341 3.091 17.909.659A2.25 2.25 0 0 0 16.319 0H8.25A2.25 2.25 0 0 0 6 2.25V4.5H2.25A2.25 2.25 0 0 0 0 6.75v15A2.25 2.25 0 0 0 2.25 24h10.5A2.25 2.25 0 0 0 15 21.75V19.5h3.75A2.25 2.25 0 0 0 21 17.25V4.682a2.25 2.25 0 0 0-.659-1.591ZM12.469 21.75H2.53a.281.281 0 0 1-.281-.281V7.03a.281.281 0 0 1 .281-.281H6v10.5a2.25 2.25 0 0 0 2.25 2.25h4.5v1.969a.282.282 0 0 1-.281.281Zm6-4.5H8.53a.281.281 0 0 1-.281-.281V2.53a.281.281 0 0 1 .281-.281H13.5v4.125c0 .621.504 1.125 1.125 1.125h4.125v9.469a.282.282 0 0 1-.281.281Zm.281-12h-3v-3h.451c.075 0 .147.03.2.082L18.667 4.6a.283.283 0 0 1 .082.199v.451Z"
                fill="#A4FFAF"
              />
            </svg>
          </button>
        </div>
      </section>

      <section class="generator__controls">
        <form id="generator__form">
          <div class="generator__length-header">
            <p>Character Length</p>
            <span class="generator__length-value">0</span>
          </div>

          <div class="generator__slider-wrapper">
            <input
              class="generator__slider"
              type="range"
              min="0"
              max="20"
              value="0"
              step="1"
            />
          </div>

          <fieldset class="generator__fieldset">
            <legend class="sr-only">Password Options</legend>

            <label
              for="generator__checkbox-upper"
              class="generator__checkbox-label"
            >
              <input
                id="generator__checkbox-upper"
                class="generator__checkbox sr-only"
                type="checkbox"
              />
              <span class="generator__checkbox-visual"></span>
              Include Uppercase Letters
            </label>

            <label
              for="generator__checkbox-lower"
              class="generator__checkbox-label"
            >
              <input
                id="generator__checkbox-lower"
                class="generator__checkbox sr-only"
                type="checkbox"
              />
              <span class="generator__checkbox-visual"></span>
              Include Lowercase Letters
            </label>

            <label
              for="generator__checkbox-number"
              class="generator__checkbox-label"
            >
              <input
                id="generator__checkbox-number"
                class="generator__checkbox sr-only"
                type="checkbox"
              />
              <span class="generator__checkbox-visual"></span>
              Include Numbers
            </label>

            <label
              for="generator__checkbox-symbol"
              class="generator__checkbox-label"
            >
              <input
                id="generator__checkbox-symbol"
                class="generator__checkbox sr-only"
                type="checkbox"
              />
              <span class="generator__checkbox-visual"></span>
              Include Symbols
            </label>
          </fieldset>

          <div class="generator__strength-indicator" data-strength="1">
            <p>STRENGTH</p>
            <div class="generator__strength-bar-wrapper">
              <p class="generator__strength-text">MEDIUM</p>
              <div class="generator__strength-bars">
                <div class="generator__strength-bar"></div>
                <div class="generator__strength-bar"></div>
                <div class="generator__strength-bar"></div>
                <div class="generator__strength-bar"></div>
              </div>
            </div>
          </div>

          <button class="generator__button" type="submit">
            <span>GENERATE</span>
            <svg width="12" height="12" xmlns="http://www.w3.org/2000/svg">
              <path
                fill="#24232C"
                d="m5.106 12 6-6-6-6-1.265 1.265 3.841 3.84H.001v1.79h7.681l-3.841 3.84z"
              />
            </svg>
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
